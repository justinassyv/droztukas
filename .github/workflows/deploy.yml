name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          rsync -avzc --delete \
            --exclude='node_modules' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.claude/' \
            --exclude='.env' \
            --exclude='orders.db' \
            --exclude='orders.db-shm' \
            --exclude='orders.db-wal' \
            --exclude='orders.db-journal' \
            -e "ssh" \
            ./ root@${{ secrets.VPS_HOST }}:/var/www/droztukas/

      - name: Install deps and restart service
        run: |
          ssh root@${{ secrets.VPS_HOST }} <<'EOF'
            set -e
            cd /var/www/droztukas
            chown -R droztukas:droztukas /var/www/droztukas
            sudo -u droztukas npm ci --omit=dev
            fuser -k 3000/tcp || true
            systemctl restart droztukas
            systemctl --no-pager status droztukas | head -n 10
            echo "Deploy complete."
          EOF
