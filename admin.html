<!doctype html>
<html lang="lt">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Drožtukas — administravimas</title>
<meta name="robots" content="noindex,nofollow" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #F4F1EC;
    --bg-2: #ECE7DE;
    --paper: #FFFFFF;
    --ink: #141414;
    --ink-2: #2A2926;
    --muted: #6E6A62;
    --line: #D9D3C7;
    --line-2: #E5DFD3;
    --warn: #C2410C;
    --ok: #157347;
    --radius: 14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: var(--bg); color: var(--ink);
    -webkit-font-smoothing: antialiased; line-height: 1.55; font-size: 16px;
  }
  h1,h2,h3,h4{font-family:'Space Grotesk', 'Inter', sans-serif; letter-spacing:-0.01em; line-height:1.1; margin:0; color:var(--ink)}
  h2{font-size: 28px; font-weight:600}
  h3{font-size: 20px; font-weight:600}
  a{color:inherit}
  .mono{font-family:'JetBrains Mono', monospace}
  .eyebrow{font-family:'JetBrains Mono', monospace; font-size: 11px; letter-spacing:0.12em; text-transform: uppercase; color: var(--muted)}

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding: 10px 18px; border-radius: 999px; font-weight:600; font-size:14px;
    text-decoration:none; cursor:pointer; border:1px solid transparent;
    font-family: inherit;
    transition: transform .15s ease, background .2s ease, border-color .2s ease;
  }
  .btn-primary{background:var(--ink); color:#fff}
  .btn-primary:hover{background:#000}
  .btn-ghost{background:transparent; color:var(--ink); border-color:var(--line)}
  .btn-ghost:hover{border-color:var(--ink)}
  .btn:disabled{opacity:.6; cursor: wait}

  .field{display:flex; flex-direction:column; gap:6px; margin-bottom: 14px}
  .field label{font-size:13px; font-weight:500; color:var(--ink-2)}
  .field input{
    font: inherit; padding: 12px 14px; border:1px solid var(--line);
    border-radius: 10px; background:#fff; color:var(--ink);
    transition: border-color .2s ease, box-shadow .2s ease;
  }
  .field input:focus{outline:none; border-color: var(--ink); box-shadow: 0 0 0 3px rgba(20,20,20,0.06)}
  .err{font-size:12.5px; color: var(--warn); margin-top:4px}

  .wrap{max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px}

  .login-card{
    max-width: 380px; margin: 80px auto; background: var(--paper);
    border:1px solid var(--line); border-radius: var(--radius);
    padding: 32px;
  }

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    flex-wrap: wrap; gap:12px;
    padding-bottom: 18px; margin-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }
  .topbar .title{display:flex; align-items:baseline; gap:14px; flex-wrap: wrap}
  .topbar h2{font-size: 22px}
  .topbar .count{font-family:'JetBrains Mono', monospace; font-size:12px; color: var(--muted)}

  .filters{display:flex; gap:6px; flex-wrap: wrap}
  .chip{
    padding: 6px 14px; border-radius:999px; font-size: 13px; font-weight:500;
    border: 1px solid var(--line); background: var(--paper); color: var(--ink-2);
    cursor:pointer; font-family: inherit;
  }
  .chip.active{background: var(--ink); color: #fff; border-color: var(--ink)}
  .chip:hover:not(.active){border-color: var(--ink)}

  .ord-list{display:flex; flex-direction: column; gap: 14px}
  .ord-card{
    background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 20px; display: grid; gap: 14px;
  }
  .ord-head{
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 10px;
  }
  .ord-num{font-family:'JetBrains Mono', monospace; font-size:14px; font-weight:600}
  .ord-time{font-size: 12.5px; color: var(--muted)}
  .ord-grid{
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px 24px;
    font-size: 14px;
  }
  @media (max-width: 600px){ .ord-grid{grid-template-columns: 1fr} }
  .ord-grid .lbl{font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 2px}
  .ord-grid a{text-decoration:none}
  .ord-grid a:hover{text-decoration: underline}
  .ord-notes{padding: 10px 12px; background: var(--bg-2); border-radius: 8px; font-style: italic; color: var(--ink-2); font-size: 13.5px}
  .ord-foot{display:flex; justify-content: flex-end; gap: 10px; padding-top: 6px; border-top: 1px solid var(--line-2)}

  .pill{
    display:inline-flex; align-items:center; gap:6px;
    padding:4px 10px; border-radius:999px;
    font-family:'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: .04em; text-transform: uppercase;
    border: 1px solid transparent;
  }
  .pill-pending{background: #FFF1E6; color: var(--warn); border-color: #F5D6BC}
  .pill-done{background: #E6F4EC; color: var(--ok); border-color: #BFE0CC}

  .empty{padding: 60px 20px; text-align: center; color: var(--muted)}

  .section-head{
    display:flex; align-items:center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px; margin-bottom: 18px;
  }
  .section-head .title{display:flex; align-items:baseline; gap:14px; flex-wrap: wrap}
  .section-head h2{font-size: 22px}

  .kpi-grid{
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
    margin-bottom: 18px;
  }
  @media (max-width: 800px){ .kpi-grid{grid-template-columns: repeat(2, 1fr)} }
  .kpi{
    background: var(--paper); border:1px solid var(--line); border-radius: var(--radius);
    padding: 16px 18px;
  }
  .kpi-label{font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted)}
  .kpi-val{font-family:'Space Grotesk', 'Inter', sans-serif; font-size: 32px; font-weight: 600; line-height: 1.1; margin-top: 6px}
  .kpi-sub{font-size: 12.5px; color: var(--muted); margin-top: 4px}

  .stat-cols{display: grid; grid-template-columns: 1fr 1fr; gap: 14px}
  @media (max-width: 800px){ .stat-cols{grid-template-columns: 1fr} }
  .stat-card{
    background: var(--paper); border:1px solid var(--line); border-radius: var(--radius);
    padding: 18px 20px;
  }
  .stat-card h3{font-size: 16px; margin-bottom: 12px}
  .stat-list{list-style: none; padding: 0; margin: 0}
  .stat-list li{
    display: flex; justify-content: space-between; align-items: baseline; gap: 12px;
    padding: 8px 0; border-bottom: 1px solid var(--line-2);
    font-size: 14px;
  }
  .stat-list li:last-child{border-bottom: 0}
  .stat-key{overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0}
  .stat-val{color: var(--muted); font-size: 13px; flex-shrink: 0}

  .chart{
    display: flex; align-items: flex-end; gap: 2px;
    height: 140px; padding: 6px 0;
  }
  .chart-col{flex: 1; height: 100%; display: flex; align-items: flex-end}
  .chart-bar{
    width: 100%; min-height: 1px;
    background: var(--ink); border-radius: 2px 2px 0 0;
    opacity: 0.85; transition: opacity .15s ease;
  }
  .chart-col:hover .chart-bar{opacity: 1}
  .chart-axis{
    display: flex; justify-content: space-between; font-size: 11px;
    color: var(--muted); margin-top: 6px;
  }
  .notice{
    background: var(--paper); border:1px solid var(--line); border-radius: var(--radius);
    padding: 20px; margin-bottom: 18px; color: var(--ink-2);
  }
  .notice-warn{border-color: #F5D6BC; background: #FFF7F0}
</style>
</head>
<body>

<div id="admin-root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="admin.jsx"></script>

</body>
</html>
